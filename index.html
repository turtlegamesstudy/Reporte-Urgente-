<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Cuestionarios Pendientes - Todos los Grupos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root{
    --bg:#f5f7fa;
    --surface:#ffffff;
    --surface-hover:#fafbfc;

    --text:#1f2937;
    --text-muted:#6b7280;

    --primary:#2563eb;
    --primary-light:#dbeafe;

    --danger:#dc2626;
    --warning:#d97706;
    --success:#16a34a;

    --border:#e5e7eb;

    --radius:14px;
    --shadow:0 4px 20px rgba(0,0,0,.06);
    --transition:.25s ease;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
    padding:32px;
}

.container{
    max-width:1400px;
    margin:auto;
}

/* ==========================
   HEADER
========================== */

header{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:32px;
    text-align:center;
    margin-bottom:24px;
    box-shadow:var(--shadow);
}

header h1{
    font-size:2rem;
    font-weight:700;
    color:var(--text);
    margin-bottom:8px;
}

header p{
    color:var(--text-muted);
}

/* ==========================
   STATS
========================== */

.stats-bar{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
    margin-bottom:24px;
}

.stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px;
    text-align:center;
    box-shadow:var(--shadow);
}

.stat-card .number{
    font-size:2rem;
    font-weight:700;
    color:var(--primary);
}

.stat-card .label{
    color:var(--text-muted);
    font-size:.85rem;
    margin-top:6px;
}

/* ==========================
   CONTROLES
========================== */

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:24px;
}

.btn{
    border:none;
    border-radius:10px;
    padding:10px 18px;
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
    transition:var(--transition);
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-filter{
    background:white;
    border:1px solid var(--border);
    color:var(--text);
}

.btn-filter.active{
    background:var(--primary);
    color:white;
    border-color:var(--primary);
}

.btn-pdf{
    background:var(--danger);
    color:white;
}

.btn-pdf:hover{
    opacity:.9;
}

.search-box{
    flex:1;
    min-width:250px;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:white;
    font-size:.95rem;
    outline:none;
}

.search-box:focus{
    border-color:var(--primary);
}

/* ==========================
   GRUPOS
========================== */

.group-section{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:var(--shadow);
}

.group-header{
    padding:18px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    background:#fafafa;
    border-bottom:1px solid var(--border);
}

.group-header h2{
    font-size:1.05rem;
    font-weight:700;
}

.badge{
    background:var(--primary-light);
    color:var(--primary);
    padding:4px 10px;
    border-radius:999px;
    font-size:.75rem;
    font-weight:600;
}

.toggle-icon{
    transition:var(--transition);
}

.group-header.collapsed .toggle-icon{
    transform:rotate(-90deg);
}

.group-content{
    padding:16px;
}

.group-content.collapsed{
    display:none;
}

/* ==========================
   ESTUDIANTES
========================== */

.student-card{
    border:1px solid var(--border);
    border-radius:12px;
    margin-bottom:12px;
    overflow:hidden;
    transition:var(--transition);
}

.student-card:hover{
    border-color:#cbd5e1;
    background:var(--surface-hover);
}

.student-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 18px;
    cursor:pointer;
}

.student-name{
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:600;
}

.avatar{
    width:38px;
    height:38px;
    border-radius:50%;
    background:var(--primary);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:.85rem;
    font-weight:700;
}

.count-badge{
    padding:6px 12px;
    border-radius:999px;
    font-size:.8rem;
    font-weight:700;
}

.count-high{
    background:#fee2e2;
    color:var(--danger);
}

.count-medium{
    background:#fef3c7;
    color:var(--warning);
}

.count-low{
    background:#dcfce7;
    color:var(--success);
}

/* ==========================
   PENDIENTES
========================== */

.student-pendientes{
    display:none;
    padding:0 18px 18px;
}

.student-pendientes.expanded{
    display:block;
    animation:fade .25s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(-5px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.pendiente-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    margin-top:8px;
    background:#f9fafb;
    border-radius:10px;
    border:1px solid #eef2f7;
}

.pendiente-text{
    color:var(--text);
    font-size:.92rem;
}

/* ==========================
   FOOTER
========================== */

.footer{
    text-align:center;
    margin-top:30px;
    color:var(--text-muted);
    font-size:.85rem;
}

/* ==========================
   RESPONSIVE
========================== */

@media(max-width:768px){

    body{
        padding:16px;
    }

    .student-header{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }

    header h1{
        font-size:1.5rem;
    }

    .controls{
        flex-direction:column;
    }

    .search-box{
        width:100%;
    }
}
</style>
<base target="_blank">
</head>

</div>

let currentFilter = 'todos';

function getIniciales(nombre) {
  return nombre.split(' ').map(n => n[0]).join('').substring(0,2);
}

function getCountClass(count) {
  if (count > 10) return 'count-high';
  if (count >= 5) return 'count-medium';
  return 'count-low';
}

function renderContent() {
  const contentArea = document.getElementById('contentArea');
  contentArea.innerHTML = '';

  let totalEst = 0, totalPen = 0, totalGrup = 0, criticos = 0;

  for (const [grupo, estudiantes] of Object.entries(data)) {
    totalGrup++;

    const grupoSection = document.createElement('div');
    grupoSection.className = 'group-section';
    grupoSection.dataset.grupo = grupo;

    const estudiantesFiltrados = [];
    for (const [nombre, pendientes] of Object.entries(estudiantes)) {
      const count = pendientes.length;
      totalEst++;
      totalPen += count;
      if (count > 10) criticos++;

      let mostrar = true;
      if (currentFilter === 'criticos' && count <= 10) mostrar = false;
      if (currentFilter === 'moderados' && (count < 5 || count > 10)) mostrar = false;
      if (currentFilter === 'leves' && count >= 5) mostrar = false;

      const searchTerm = document.getElementById('searchBox').value.toLowerCase();
      if (searchTerm && !nombre.toLowerCase().includes(searchTerm)) mostrar = false;

      if (mostrar) estudiantesFiltrados.push({nombre, pendientes, count});
    }

    if (estudiantesFiltrados.length === 0) continue;

    grupoSection.innerHTML = `
      <div class="group-header" onclick="toggleGrupo(this)">
        <h2>👥 ${grupo} <span class="badge">${estudiantesFiltrados.length} estudiantes</span></h2>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="group-content">
        ${estudiantesFiltrados.map(e => `
          <div class="student-card" data-count="${e.count}">
            <div class="student-header" onclick="toggleEstudiante(event, this)">
              <div class="student-name">
                <div class="avatar">${getIniciales(e.nombre)}</div>
                ${e.nombre}
              </div>
              <div class="pendientes-count">
                <span class="count-badge ${getCountClass(e.count)}">${e.count} cuestionarios</span>
              </div>
            </div>
            <div class="student-pendientes">
              ${e.pendientes.map(p => `
                <div class="pendiente-item">
                  <span class="pendiente-icon">📝</span>
                  <span class="pendiente-text">${p}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;

    contentArea.appendChild(grupoSection);
  }

  document.getElementById('totalEstudiantes').textContent = totalEst;
  document.getElementById('totalPendientes').textContent = totalPen;
  document.getElementById('totalGrupos').textContent = totalGrup;
  document.getElementById('promedioPendientes').textContent = totalEst > 0 ? (totalPen/totalEst).toFixed(1) : 0;
  document.getElementById('criticosCount').textContent = criticos;
}

function toggleGrupo(header) {
  header.classList.toggle('collapsed');
  const content = header.nextElementSibling;
  content.classList.toggle('collapsed');
}

function toggleEstudiante(event, header) {
  event.stopPropagation();
  const pendientes = header.nextElementSibling;
  pendientes.classList.toggle('expanded');
}

function filtrarTodos() { currentFilter = 'todos'; updateFilterButtons(); renderContent(); }
function filtrarCriticos() { currentFilter = 'criticos'; updateFilterButtons(); renderContent(); }
function filtrarModerados() { currentFilter = 'moderados'; updateFilterButtons(); renderContent(); }
function filtrarLeves() { currentFilter = 'leves'; updateFilterButtons(); renderContent(); }

function updateFilterButtons() {
  document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
  const buttons = document.querySelectorAll('.btn-filter');
  if (currentFilter === 'todos') buttons[0].classList.add('active');
  if (currentFilter === 'criticos') buttons[1].classList.add('active');
  if (currentFilter === 'moderados') buttons[2].classList.add('active');
  if (currentFilter === 'leves') buttons[3].classList.add('active');
}

function buscarEstudiante() {
  renderContent();
}

function expandirTodos() {
  document.querySelectorAll('.student-pendientes').forEach(el => el.classList.add('expanded'));
  document.querySelectorAll('.group-content').forEach(el => el.classList.remove('collapsed'));
  document.querySelectorAll('.group-header').forEach(el => el.classList.remove('collapsed'));
}

function colapsarTodos() {
  document.querySelectorAll('.student-pendientes').forEach(el => el.classList.remove('expanded'));
  document.querySelectorAll('.group-content').forEach(el => el.classList.add('collapsed'));
  document.querySelectorAll('.group-header').forEach(el => el.classList.add('collapsed'));
}

function exportarExcel() {

    const wb = XLSX.utils.book_new();

    Object.entries(data).forEach(([grupo, estudiantes]) => {

        const wsData = [];

        wsData.push([
            "Estudiante",
            "Cantidad de Pendientes",
            "Cuestionarios Pendientes"
        ]);

        Object.entries(estudiantes)
            .sort((a,b) => b[1].length - a[1].length)
            .forEach(([nombre, pendientes]) => {

                const listaOrdenada = pendientes
                    .map((p,index) => `${index + 1}. ${p}`)
                    .join("\n");

                wsData.push([
                    nombre,
                    pendientes.length,
                    listaOrdenada
                ]);
            });

        const ws = XLSX.utils.aoa_to_sheet(wsData);

        ws['!cols'] = [
            { wch: 35 },
            { wch: 18 },
            { wch: 90 }
        ];

        for(let row = 1; row <= wsData.length; row++){
            ws[`C${row}`] && (ws[`C${row}`].s = {
                alignment:{
                    wrapText:true,
                    vertical:"top"
                }
            });
        }

        const range = XLSX.utils.decode_range(ws['!ref']);

        for(let C = range.s.c; C <= range.e.c; C++){

            const cell = XLSX.utils.encode_cell({r:0,c:C});

            if(!ws[cell]) continue;

            ws[cell].s = {
                fill:{
                    fgColor:{rgb:"2563EB"}
                },
                font:{
                    color:{rgb:"FFFFFF"},
                    bold:true,
                    sz:12
                },
                alignment:{
                    horizontal:"center",
                    vertical:"center"
                },
                border:{
                    top:{style:"thin"},
                    bottom:{style:"thin"},
                    left:{style:"thin"},
                    right:{style:"thin"}
                }
            };
        }

        for(let R = 1; R <= range.e.r; R++){

            const total = ws[`B${R+1}`];

            let color = "DCFCE7";

            if(total){
                if(total.v > 10) color = "FEE2E2";
                else if(total.v >= 5) color = "FEF3C7";
            }

            for(let C = 0; C <= range.e.c; C++){

                const cell = XLSX.utils.encode_cell({r:R,c:C});

                if(!ws[cell]) continue;

                ws[cell].s = {
                    fill:{
                        fgColor:{rgb:color}
                    },
                    alignment:{
                        wrapText:true,
                        vertical:"top"
                    },
                    border:{
                        top:{style:"thin", color:{rgb:"D1D5DB"}},
                        bottom:{style:"thin", color:{rgb:"D1D5DB"}},
                        left:{style:"thin", color:{rgb:"D1D5DB"}},
                        right:{style:"thin", color:{rgb:"D1D5DB"}}
                    }
                };
            }
        }

        ws['!freeze'] = {
            xSplit:0,
            ySplit:1
        };

        XLSX.utils.book_append_sheet(
            wb,
            ws,
            grupo.substring(0,31)
        );

    });

    XLSX.writeFile(
        wb,
        `Reporte_Cuestionarios_${new Date().toISOString().split('T')[0]}.xlsx`
    );
}
renderContent();
