<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Cuestionarios Pendientes - Todos los Grupos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<link rel="stylesheet" href="./styles.css">

<base target="_blank">
</head>
<body>
<div class="container">
  <header>
    <h1>📝 Cuestionarios Pendientes</h1>
    <p>Todos los Grupos - Tecnológico Nacional de Nicaragua</p>
    <p id="ultimaActualizacion" style="margin-top:8px;font-weight:600;color:#2563eb;"></p>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="number" id="totalEstudiantes">0</div>
      <div class="label">Estudiantes con pendientes</div>
    </div>
    <div class="stat-card">
      <div class="number" id="totalPendientes">0</div>
      <div class="label">Total cuestionarios</div>
    </div>
    <div class="stat-card">
      <div class="number" id="totalGrupos">0</div>
      <div class="label">Grupos</div>
    </div>
    <div class="stat-card">
      <div class="number" id="promedioPendientes">0</div>
      <div class="label">Promedio por estudiante</div>
    </div>
    <div class="stat-card">
      <div class="number" id="criticosCount">0</div>
      <div class="label">Estudiantes críticos</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-pdf" onclick="exportarExcel()"> 📊 Exportar Excel</button>
    <button class="btn btn-filter active" onclick="filtrarTodos()">Todos</button>
    <button class="btn btn-filter" onclick="filtrarCriticos()">🔴 Críticos (>10)</button>
    <button class="btn btn-filter" onclick="filtrarModerados()">🟡 Moderados (5-10)</button>
    <button class="btn btn-filter" onclick="filtrarLeves()">🟢 Leves (<5)</button>
    <button class="btn btn-filter" onclick="expandirTodos()">📂 Expandir Todo</button>
    <button class="btn btn-filter" onclick="colapsarTodos()">📁 Colapsar Todo</button>
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar estudiante..." onkeyup="buscarEstudiante()">
  </div>

  <div id="contentArea"></div>

  <div class="footer">
    © Derechos Reservados Hanzell Mayorga | Turtle Games Dev 2026
  </div>
</div>
</body>


<div id="cinematic-intro">
    <div class="intro-bg"></div>
    <div class="intro-particles"></div>
    <div class="energy-lines"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="intro-center">
        <div class="logo-glow"></div>

        <div class="logo-text">
            TURTLE GAMES DEV
        </div>

        <div class="subtitle">
            PRESENTA
        </div>
    </div>

    <div class="light-sweep"></div>
</div>
<script src="./script.js"></script>
</html>
